name: Deploy to VPS

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy-backend:
    name: Deploy Backend (Laravel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME_BACKEND }}
          password: ${{ secrets.VPS_PASSWORD_BACKEND }}
          script: |
            # المسار الرئيسي للمشروع
            TARGET_DIR="/home/alamin-api/htdocs/api.alamin.se"
            mkdir -p $TARGET_DIR
            cd $TARGET_DIR
            
            # محاولة تصحيح ملكية المجلد إذا توفرت الصلاحية
            sudo chown -R $USER:$USER . 2>/dev/null || echo "تنبيه: تعذر تغيير الملكية، سنحاول المتابعة بالصلاحيات الحالية"
            
            # حل مشكلة الملكية في Git
            git config --global --add safe.directory $TARGET_DIR
            
            # إذا لم يكن المشروع مربوطاً بـ Git، سنحاول ربطه أو سحب الكود
            if [ ! -d ".git" ]; then
              git clone https://github.com/mohamedal2min-u/happy-chicken.git .
            else
              # تنظيف أقفال Git إذا وجدت بسبب فشل سابق
              rm -f .git/index.lock
              git fetch origin
              git reset --hard origin/main
            fi
            
            # الدخول لمجلد backend إذا كان المشروع منظماً بداخله
            if [ -d "backend" ]; then 
              cd backend
              # محاولة تصحيح الصلاحيات للمجلدات الحساسة
              chmod -R 777 storage bootstrap/cache 2>/dev/null || echo "تنبيه: تعذر تغيير صلاحيات المجلدات، قد يفشل composer"
            fi
            
            # تفعيل المحمل الذاتي وتحديث قاعدة البيانات
            composer install --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache

  deploy-dashboard:
    name: Deploy Dashboard (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Cache Node Modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: dashboard/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('dashboard/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Build Dashboard
        run: |
          cd dashboard
          if [ "${{ steps.npm-cache.outputs.cache-hit }}" != "true" ]; then
            npm ci
          fi
          npm run build
          # ضغط الملفات لتسريع النقل
          tar -czf build-artifacts.tar.gz .next public package.json next.config.mjs

      - name: Upload Dashboard to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME_FRONTEND }}
          password: ${{ secrets.VPS_PASSWORD_FRONTEND }}
          source: "dashboard/build-artifacts.tar.gz"
          target: "/home/maa/htdocs/ch.alamin.se"
          strip_components: 1

      - name: Restart Application via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME_FRONTEND }}
          password: ${{ secrets.VPS_PASSWORD_FRONTEND }}
          script: |
            cd /home/maa/htdocs/ch.alamin.se
            
            # فك ضغط الملفات المرفوعة
            tar -xzf build-artifacts.tar.gz
            rm build-artifacts.tar.gz
            
            # التأكد من المسارات والمكتبات
            export PATH=$PATH:/home/maa/.nvm/versions/node/$(node -v)/bin
            npm install --production
            
            # إعادة التشغيل باستخدام PM2 بشكل نظيف
            pm2 delete dashboard || true
            pm2 start npm --name "dashboard" -- start -- -p 3000
            pm2 save
