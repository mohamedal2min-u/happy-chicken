name: Deploy to VPS

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # =========================================================
            # هام جداً: قم بتغيير /var/www/MAA إلى مسار المشروع على السيرفر
            # =========================================================
            cd /var/www/MAA
            
            echo "Pulling latest changes from GitHub..."
            # تأكد أن اسم الفرع هو main، إذا كان master قم بتغييرها
            git pull origin main
            
            # =========================================================
            # 1. تحديث الخلفية (Backend - Laravel)
            # =========================================================
            echo "Deploying Backend..."
            cd backend
            composer install --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # =========================================================
            # 2. تحديث الواجهة (Dashboard - Next.js)
            # =========================================================
            echo "Deploying Dashboard..."
            cd ../dashboard
            npm install
            npm run build
            
            # نفترض أنك تستخدم pm2 لتشغيل الـ dashboard على السيرفر
            # إذا كان اسم التطبيق في pm2 مختلف، قم بتغيير 'all'
            pm2 restart all || true
            
            echo "Deployment Completed Successfully!"
