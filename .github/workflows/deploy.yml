name: Deploy to VPS

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy-backend:
    name: Deploy Backend (Laravel)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME_BACKEND }}
          password: ${{ secrets.VPS_PASSWORD_BACKEND }}
          script: |
            # الذهاب لمسار الباك إند
            cd /home/alamin-api/htdocs/api.alamin.se
            
            echo "Pulling latest backend changes..."
            git pull origin main || true
            
            cd backend
            composer install --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

  deploy-dashboard:
    name: Deploy Dashboard (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Dashboard via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME_FRONTEND }}
          password: ${{ secrets.VPS_PASSWORD_FRONTEND }}
          script: |
            # الذهاب لمسار الواجهة
            cd /home/maa/htdocs/ch.alamin.se
            
            echo "Pulling latest dashboard changes..."
            git pull origin main || true
            
            cd dashboard
            npm install
            npm run build
            
            # إعادة تشغيل التطبيق لو كنت تستخدم pm2 (أو أي أوامر مخصصة)
            pm2 restart all || true
