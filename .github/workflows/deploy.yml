name: Deploy to VPS

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy-backend:
    name: Deploy Backend (Laravel)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME_BACKEND }}
          password: ${{ secrets.VPS_PASSWORD_BACKEND }}
          script: |
            # المسار الذي زودتني به
            cd /home/alamin-api/htdocs/api.alamin.se/public
            
            echo "Pulling latest backend changes..."
            git pull origin main || git pull origin master
            
            # الدخول لمجلد backend إذا كان موجوداً
            if [ -d "backend" ]; then cd backend; fi
            
            composer install --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache

  deploy-dashboard:
    name: Deploy Dashboard (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Dashboard via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME_FRONTEND }}
          password: ${{ secrets.VPS_PASSWORD_FRONTEND }}
          script: |
            # المسار الذي زودتني به للواجهة
            cd /home/maa/htdocs/ch.alamin.se
            
            echo "Pulling latest dashboard changes..."
            git pull origin main || git pull origin master
            
            # الدخول لمجلد dashboard إذا كان موجوداً
            if [ -d "dashboard" ]; then cd dashboard; fi
            
            npm install
            npm run build
            
            # إعادة تشغيل التطبيق (pm2)
            pm2 restart all || pm2 start npm --name "dashboard" -- start
